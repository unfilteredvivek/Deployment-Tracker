apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment-tracker
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: deployment-tracker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: deployment-tracker
    spec:
      containers:
      - name: deployment-tracker
        image: unfilteredvivek/deployment-tracker:latest
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: app-config
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "128Mi"
            cpu: "500m"
