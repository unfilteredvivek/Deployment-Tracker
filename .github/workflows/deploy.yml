name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
  
      - name: Connect & Deploy
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~/Deployment-Tracker
            pm2 restart app || true &
            
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set version
        run: echo "VERSION=${{ github.run_number }}" >> $GITHUB_ENV    

      - name: Build Docker Image  
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/deployment-tracker:${{ env.VERSION}} .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/deployment-tracker:${{ env.VERSION}}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/deployment-tracker:${{ env.VERSION}}
            docker rm -f deployed-app || true
            docker pull ${{ secrets.DOCKER_USERNAME }}/deployment-tracker:${{ env.VERSION }}
            docker run -d -p 3001:3000 --name deployed-app ${{ secrets.DOCKER_USERNAME }}/deployment-tracker:${{ env.VERSION }}