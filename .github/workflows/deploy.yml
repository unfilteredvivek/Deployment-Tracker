name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Connect & Deploy
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~/Deployment-Tracker
            git pull origin main
            sudo pkill node || true
            nohup node app.js > output.log 2>&1 &
            
            - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set version
        run: echo "VERSION=${{ github.run_number }}" >> $GITHUB_ENV    

      - name: Build Docker Image  
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/deployment-tracker:${{ env.VERSION}} .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/deployment-tracker:${{ env.VERSION}}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/deployment-tracker:${{ env.VERSION}}
            docker stop app || true
            docker rm app || true
            docker run -d -p 3000:3000 --name app ${{ secrets.DOCKER_USERNAME }}/deployment-tracker:${{ env.VERSION}}